version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

homebrew:
  - name: hive
    repository:
      owner: fjcasti1
      name: homebrew-hive
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: https://github.com/fjcasti1/hive
    description: Manage multiple AI agent sessions in tmux
    license: MIT
    install: bin.install "hive"
    test: system "#{bin}/hive", "--version"
